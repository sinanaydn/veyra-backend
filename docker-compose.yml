services:
  postgres:
    image: postgres:17-alpine
    container_name: veyra_db
    environment:
      POSTGRES_USER: veyra_user
      POSTGRES_PASSWORD: veyra_pass
      POSTGRES_DB: veyra_db
    ports:
      - "5433:5432"
    volumes:
      - veyra_pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  veyra_pgdata:
