spring:
  application:
    name: veyra-rentacar
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

veyra:
  security:
    jwt:
      secret-key: "veyra-super-secret-key-minimum-256-bits-long-change-in-prod!"
      expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000
  reservation:
    code-prefix: VYR

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5433/veyra_db
    username: veyra_user
    password: veyra_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: VeyraHikariPool-dev
      maximum-pool-size: 10

  jpa:
    show-sql: true

logging:
  level:
    com.veyra: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
    hikari:
      pool-name: VeyraHikariPool-prod
      maximum-pool-size: 25

  jpa:
    hibernate:
      ddl-auto: validate

veyra:
  security:
    jwt:
      secret-key: ${JWT_SECRET}

logging:
  level:
    com.veyra: INFO
